# KShare Nginx config
# Place this at: /etc/nginx/sites-available/kshare
# Then: sudo ln -s /etc/nginx/sites-available/kshare /etc/nginx/sites-enabled/kshare
#
# Requires a wildcard SSL certificate for your domain.
# See docs/dns-setup.md for how to get one with Certbot.
#
# Replace YOUR_DOMAIN with your actual domain (e.g. kodelyth.net)

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=tunnel:10m rate=50r/s;
limit_req_zone $binary_remote_addr zone=admin:10m  rate=5r/m;

# Redirect all HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN *.YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

# Wildcard — handles all tunnel subdomains (ab12x.YOUR_DOMAIN, etc.)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name *.YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    limit_req zone=tunnel burst=100 nodelay;

    location / {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;

        # WebSocket support (for CLI tunnel connections)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        client_max_body_size 10m;
    }
}

# Admin dashboard — admin.YOUR_DOMAIN
# Secured at application level by ADMIN_SECRET header (set in server .env)
# Rate limited aggressively to slow brute force attempts
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name admin.YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Aggressive rate limit on admin — 5 requests/min per IP
    limit_req zone=admin burst=10 nodelay;

    # Hide server info
    server_tokens off;

    location / {
        proxy_pass       http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin API calls from the dashboard UI go to port 4001
    location /api/admin/ {
        proxy_pass       http://127.0.0.1:4001/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Apex domain — landing page / user dashboard
