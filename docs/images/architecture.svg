<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" width="900" height="260">
  <defs>
    <style>
      .bg { fill: #0d0d0d; }
      .box { fill: #151515; stroke: #2a2a2a; stroke-width: 1.5; rx: 10; }
      .box-active { fill: #0f1a0f; stroke: #22c55e; stroke-width: 1.5; }
      .label { font-family: 'SF Mono', 'JetBrains Mono', 'Consolas', monospace; font-size: 13px; fill: #e2e8f0; font-weight: 600; }
      .sublabel { font-family: 'SF Mono', 'JetBrains Mono', 'Consolas', monospace; font-size: 11px; fill: #555; }
      .arrow-line { stroke: #2a2a2a; stroke-width: 1.5; fill: none; stroke-dasharray: 4 3; }
      .arrow-solid { stroke: #22c55e; stroke-width: 2; fill: none; }
      .arrow-head { fill: #22c55e; }
      .step-label { font-family: 'SF Mono', 'JetBrains Mono', 'Consolas', monospace; font-size: 10px; fill: #444; text-anchor: middle; }
      .step-label-green { font-family: 'SF Mono', 'JetBrains Mono', 'Consolas', monospace; font-size: 10px; fill: #22c55e; text-anchor: middle; }
      .title { font-family: 'SF Mono', 'JetBrains Mono', 'Consolas', monospace; font-size: 11px; fill: #333; letter-spacing: 0.1em; text-anchor: middle; }
      .badge { fill: #1a1a1a; stroke: #2a2a2a; stroke-width: 1; }
      .badge-text { font-family: 'SF Mono', 'JetBrains Mono', 'Consolas', monospace; font-size: 9px; fill: #444; text-anchor: middle; letter-spacing: 0.06em; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="260" fill="#0d0d0d" rx="12"/>
  <rect x="1" y="1" width="898" height="258" fill="none" stroke="#1f1f1f" stroke-width="1" rx="12"/>

  <!-- Title -->
  <text x="450" y="32" class="title">HOW KSHARE WORKS</text>

  <!-- ── Node 1: Your Machine ── -->
  <rect x="40" y="60" width="180" height="120" rx="10" fill="#111" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="40" y="60" width="180" height="3" rx="1.5" fill="#22c55e" opacity="0.6"/>
  <text x="130" y="103" class="label" text-anchor="middle">Your Machine</text>
  <text x="130" y="124" class="sublabel" text-anchor="middle">localhost:3000</text>
  <!-- mini terminal -->
  <rect x="60" y="138" width="140" height="28" rx="4" fill="#0a0a0a" stroke="#1f1f1f" stroke-width="1"/>
  <circle cx="73" cy="152" r="3" fill="#f87171" opacity="0.7"/>
  <circle cx="83" cy="152" r="3" fill="#fbbf24" opacity="0.7"/>
  <circle cx="93" cy="152" r="3" fill="#a3e635" opacity="0.7"/>
  <text x="103" y="156" font-family="monospace" font-size="8" fill="#555">kshare --port 3000</text>

  <!-- ── Arrow 1: Your Machine → Tunnel Server ── -->
  <!-- Down then right then up — outbound WS -->
  <path d="M 230 110 L 340 110" stroke="#22c55e" stroke-width="1.5" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="285" y="100" class="step-label-green">outbound WebSocket</text>
  <text x="285" y="126" class="step-label">no firewall rules needed</text>

  <!-- ── Arrow back: Tunnel Server → Your Machine (HTTP request forwarded) ── -->
  <path d="M 340 130 L 230 130" stroke="#444" stroke-width="1" fill="none" stroke-dasharray="3 3" marker-end="url(#arrowGray)"/>
  <text x="285" y="148" class="step-label">request forwarded</text>

  <!-- ── Node 2: Tunnel Server ── -->
  <rect x="340" y="60" width="220" height="120" rx="10" fill="#0f1f10" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="340" y="60" width="220" height="3" rx="1.5" fill="#22c55e"/>
  <text x="450" y="103" class="label" text-anchor="middle">Tunnel Server</text>
  <text x="450" y="124" class="sublabel" text-anchor="middle">api.kodelyth.net</text>
  <text x="450" y="148" class="sublabel" text-anchor="middle">routes · proxies · expires</text>
  <!-- status dot -->
  <circle cx="366" cy="84" r="4" fill="#22c55e"/>
  <circle cx="366" cy="84" r="6" fill="#22c55e" opacity="0.2"/>

  <!-- ── Arrow 2: Tunnel Server → Public URL ── -->
  <path d="M 570 110 L 660 110" stroke="#60a5fa" stroke-width="1.5" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="615" y="100" class="step-label" style="fill:#60a5fa">HTTPS</text>
  <text x="615" y="126" class="step-label">Nginx wildcard</text>

  <path d="M 660 130 L 570 130" stroke="#444" stroke-width="1" fill="none" stroke-dasharray="3 3" marker-end="url(#arrowGray)"/>
  <text x="615" y="148" class="step-label">response</text>

  <!-- ── Node 3: Public URL ── -->
  <rect x="660" y="60" width="200" height="120" rx="10" fill="#0d1220" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="660" y="60" width="200" height="3" rx="1.5" fill="#60a5fa"/>
  <text x="760" y="103" class="label" text-anchor="middle">Public URL</text>
  <text x="760" y="124" class="sublabel" text-anchor="middle" style="fill:#60a5fa">https://ab12x.kodelyth.net</text>
  <text x="760" y="148" class="sublabel" text-anchor="middle">anyone can open this</text>
  <!-- lock icon -->
  <rect x="740" y="157" width="40" height="12" rx="2" fill="#1a1a2e" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="760" y="167" font-family="monospace" font-size="8" fill="#60a5fa" text-anchor="middle">TLS / HTTPS</text>

  <!-- ── Bottom labels ── -->
  <text x="130" y="216" class="sublabel" text-anchor="middle" style="fill:#333">Node.js CLI</text>
  <text x="450" y="216" class="sublabel" text-anchor="middle" style="fill:#333">Redis · PM2 · Nginx</text>
  <text x="760" y="216" class="sublabel" text-anchor="middle" style="fill:#333">wildcard subdomain</text>

  <!-- ── Step numbers ── -->
  <circle cx="285" cy="80" r="9" fill="#0a0a0a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="285" y="84" font-family="monospace" font-size="9" fill="#444" text-anchor="middle">1</text>
  <circle cx="615" cy="80" r="9" fill="#0a0a0a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="615" y="84" font-family="monospace" font-size="9" fill="#444" text-anchor="middle">2</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#60a5fa"/>
    </marker>
    <marker id="arrowGray" markerWidth="7" markerHeight="7" refX="5" refY="2.5" orient="auto">
      <path d="M0,0 L0,5 L7,2.5 z" fill="#444"/>
    </marker>
  </defs>
</svg>
